name: am_common
description: Common utilities and cross-cutting concerns for AM Investment application
version: 1.0.0
publish_to: "none"

environment:
  sdk: ^3.5.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Design System
  am_design_system:
    path: ../am_design_system

  # Technical Foundation (SDKs, Networking)
  am_library:
    path: ../am_library

  # File Handling
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  path: ^1.9.0

  # Cloud Storage (Cloudinary)
  cloudinary_flutter: ^1.1.1
  cloudinary_url_gen: ^1.6.0
  web_socket_channel: ^2.4.0

  # Utils
  intl: ^0.20.2
  json_annotation: ^4.9.0
  url_launcher: ^6.2.5

  # State Management
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.0.3
  bloc: ^9.1.0
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0

  # Logging
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  freezed: ^3.0.0

flutter:
  uses-material-design: true
