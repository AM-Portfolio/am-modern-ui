name: am_diagnostic_ui
description: Diagnostic & UI Lab for AM Investment Platform
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Design System
  am_design_system:
    path: ../am_design_system

  # Centralized Infrastructure
  am_library:
    path: ../am_library

  # Shared Business Logic
  am_common:
    path: ../am_common

  # State Management
  flutter_riverpod: ^3.0.3

  # Utils
  get_it: ^9.1.1
  intl: ^0.20.2
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
