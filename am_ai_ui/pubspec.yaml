name: am_ai_ui
description: AI Chat UI — sends user messages to the am-fin-agent FastAPI and renders dynamic widget responses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  am_design_system:
    path: ../am_design_system
  am_common:
    path: ../am_common
  am_auth_ui:
    path: ../am_auth_ui
  am_dashboard_ui:
    path: ../am_dashboard_ui
  am_analysis_ui:
    path: ../am_analysis/ui

  flutter_riverpod: ^3.0.3
  dio: ^5.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
