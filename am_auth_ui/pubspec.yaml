name: am_auth_ui
description: "Authentication Module (Login, OAuth, JWT)"
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
    
  am_design_system:
    path: ../am_design_system

  # State Management
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  equatable: ^2.0.7
  
  # Network & Data
  dio: ^5.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  
  # DI
  get_it: ^9.1.1
  injectable: ^2.4.4

  # Utils
  dartz: ^0.10.1
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^3.2.3

flutter:
  assets:
    - assets/test_users.json
