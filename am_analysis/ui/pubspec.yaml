name: am_analysis_ui
description: "Common Analysis UI Module for AM Platform (Charts, Performance, Analytics)"
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Core headless state management
  am_analysis_core:
    path: ../am_analysis_core

  # Design system
  am_design_system:
    path: ../am_design_system

  # AM Common Modules
  am_common:
    path: ../am_common

  # Analysis SDK (Generated)
  am_analysis_sdk:
    path: ../am_analysis/sdk


  # State Management
  bloc: ^9.1.0
  flutter_bloc: ^9.1.1

  # Logging
  logger: ^2.0.0

  # Charts
  fl_chart: ^1.1.1

  # Utils - using compatible versions with dependencies
  intl: ^0.20.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
