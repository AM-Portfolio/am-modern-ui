name: am_app
description: AM Investment Platform - Lightweight orchestration shell
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # AM Investment Modules (simple paths)
  am_design_system:
    path: ../am_design_system
  am_library:
    path: ../am_library
  am_common:
    path: ../am_common

  # ── ACTIVE MODULES ──────────────────────────────────────────────────────────
  am_auth_ui:
    path: ../am_auth_ui
  am_dashboard_ui:
    path: ../am_dashboard_ui

  # ── DISABLED (re-enable one at a time as each module is fixed) ──────────────
  am_user_ui:
    path: ../am_user_ui
  am_portfolio_ui:
    path: ../am_portfolio_ui
  am_trade_ui:
    path: ../am_trade_ui
  am_ai_ui:
    path: ../am_ai_ui
  am_diagnostic_ui:
    path: ../am_diagnostic_ui
  am_analysis_ui:
    path: ../am_analysis/ui
  am_market_ui:
    path: ../am_market/ui
  # am_common_flutter:
  #   path: ../../am-common-flutter

  # State Management
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.0.3

  # DI
  get_it: ^9.1.1

  # Navigation
  go_router: ^17.2.3

  # Utils
  intl: ^0.20.2
  dio: ^5.4.0
  webview_flutter: ^4.9.0
  webview_flutter_web: ^0.2.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
