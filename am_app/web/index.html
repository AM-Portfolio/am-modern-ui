<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AM Investment Platform">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="am_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AM Investment Platform</title>
  <link rel="manifest" href="manifest.json">

  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b1120;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #am-boot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      color: #e2e8f0;
      gap: 16px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    #am-boot .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: am-spin 0.8s linear infinite;
    }
    #am-boot-error {
      display: none;
      max-width: 720px;
      color: #fecaca;
      white-space: pre-wrap;
      text-align: left;
      background: rgba(127,29,29,0.35);
      border: 1px solid rgba(248,113,113,0.35);
      border-radius: 12px;
      padding: 16px;
    }
    @keyframes am-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="am-boot">
    <div class="spinner" aria-hidden="true"></div>
    <div id="am-boot-msg">Loading AM Investment Platform…</div>
    <pre id="am-boot-error"></pre>
  </div>

  <script>
    var AM_BUILD_ID = 'local';
    window.__AM_BOOT_T0__ = performance.now();
    window.__AM_BOOT_TRACE__ = window.__AM_BOOT_TRACE__ || { marks: {} };

    (function () {
      var msg = document.getElementById('am-boot-msg');
      if (msg && location.pathname.indexOf('/app/') === 0) {
        msg.textContent = 'Restoring your session…';
      }
    })();

    function bootTraceEnabled() {
      try {
        if (new URLSearchParams(location.search).get('bootTrace') === '1') return true;
        return localStorage.getItem('am_boot_trace') === '1';
      } catch (e) {
        return false;
      }
    }

    function bootMark(name) {
      var ms = Math.round(performance.now() - window.__AM_BOOT_T0__);
      window.__AM_BOOT_TRACE__.marks[name] = ms;
      if (bootTraceEnabled()) {
        console.log('[BootTrace] ' + name + ' @ ' + ms + 'ms (html)');
      }
    }

    bootMark('html_loaded');

    // Only purge stale service workers when build version changes.
    if ('serviceWorker' in navigator) {
      var storedBuild = null;
      try { storedBuild = localStorage.getItem('am_build_id'); } catch (e) {}
      if (storedBuild !== AM_BUILD_ID) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
        try { localStorage.setItem('am_build_id', AM_BUILD_ID); } catch (e) {}
      }
    }

    function showBootError(message) {
      var boot = document.getElementById('am-boot');
      var err = document.getElementById('am-boot-error');
      if (boot) boot.style.display = 'flex';
      if (err) {
        err.style.display = 'block';
        err.textContent = message;
      }
    }

    function isDeferredLoadError(errStr) {
      return errStr && (errStr.indexOf('DeferredLoadException') !== -1 || errStr.indexOf('part.js not loaded') !== -1);
    }

    function clearCacheAndReload() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
          window.location.reload(true);
        });
      } else {
        window.location.reload(true);
      }
    }

    window.addEventListener('error', function (event) {
      var errStr = event.message || String(event);
      if (isDeferredLoadError(errStr)) {
         clearCacheAndReload();
         return;
      }
      showBootError('JavaScript error: ' + errStr);
    });

    window.addEventListener('unhandledrejection', function (event) {
      var errStr = event.reason ? (event.reason.message || String(event.reason)) : String(event);
      if (isDeferredLoadError(errStr)) {
         clearCacheAndReload();
         return;
      }
      showBootError('Unhandled promise rejection: ' + errStr);
    });

    document.addEventListener('dart-app-ready', function () {
      bootMark('flutter_dart_ready');
      var boot = document.getElementById('am-boot');
      if (boot) boot.remove();
    });
  </script>
  <script src="flutter_bootstrap.js?v=local" async></script>
</body>
</html>
