# Preprod Environment — am-modern-ui
# Preprod app host only — am.asrax.in reserved for prod
environment: preprod

appConfig:
  domain: "am-preprod.asrax.in"
  googleWebClientId: "307768822337-ad7tee4d82cc0b4flgrfs157e5e6rc0g.apps.googleusercontent.com"

replicaCount: 1

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: am-preprod.asrax.in
      paths:
        - path: /
          pathType: Prefix
