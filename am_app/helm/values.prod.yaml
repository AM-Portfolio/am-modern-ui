# Prod Environment — am-modern-ui
# Prod app host (prep). Do not remove munish from infra Traefik.
environment: prod

appConfig:
  domain: "am.asrax.in"

replicaCount: 1

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: am.asrax.in
      paths:
        - path: /
          pathType: Prefix
