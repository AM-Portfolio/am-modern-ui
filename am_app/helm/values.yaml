global:
  image:
    imagePullSecrets:
      - name: github-registry-secret

replicaCount: 1
service:
  port: 8080
language: flutter

appConfig:
  domain: "am.munish.org"

configMap:
  enabled: true
  mountPath: /usr/share/nginx/html/config.json
  subPath: config.json

image:
  repository: am-modern-ui
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: true
  className: "nginx"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  env: "dev"

vault:
  enabled: false
