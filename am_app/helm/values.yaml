global:
  image:
    imagePullSecrets:
      - name: github-registry-secret

replicaCount: 1
service:
  port: 8080
language: flutter

# Canonical env for config.json + telemetry: dev | preprod | prod
environment: prod

appConfig:
  domain: "am.asrax.in"
  # Runtime Google Sign-In client id (not baked into the Docker image)
  googleWebClientId: "307768822337-ad7tee4d82cc0b4flgrfs157e5e6rc0g.apps.googleusercontent.com"

configMap:
  enabled: true
  mountPath: /usr/share/nginx/html/config.json
  subPath: config.json

image:
  repository: am-modern-ui
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: true
  className: "traefik"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  # Legacy key; chart uses top-level `environment` for config.json env.
  env: "prod"

vault:
  enabled: false
