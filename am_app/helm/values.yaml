global:
  image:
    imagePullSecrets:
      - name: github-registry-secret

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

language: flutter

image:
  repository: am-modern-ui
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  env: "dev"

vault:
  enabled: false
