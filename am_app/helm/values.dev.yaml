# Dev Environment — am-modern-ui
# Host URLs come from appConfig at runtime (Docker image is host-free).
environment: dev
replicaCount: 1

appConfig:
  domain: "am-dev.asrax.in"
  googleWebClientId: "307768822337-ad7tee4d82cc0b4flgrfs157e5e6rc0g.apps.googleusercontent.com"

configMap:
  enabled: true
  mountPath: /usr/share/nginx/html/config.json
  subPath: config.json

port: 8080

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Standard probes for Nginx
probes:
  port: 8080
  startup:
    path: "/"
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: "/"
  readiness:
    path: "/"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: am-apps-dev-dev-global-cors@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /
          pathType: Prefix
