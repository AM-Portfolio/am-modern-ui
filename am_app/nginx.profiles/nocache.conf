server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # App entry — always fresh (daily deploys)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    location ~ ^/config(\.[a-z]+)?\.json$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    # CanvasKit — large, changes only on Flutter SDK bump; safe to cache between app deploys
    location /canvaskit/ {
        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        etag on;
    }

    # Fonts and static assets — revalidate daily
    location /assets/ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        etag on;
    }

    # Remaining static assets (icons, manifest, etc.)
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        etag on;
    }

    # Other JS not covered above (e.g. flutter.js helpers)
    location ~* \.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }
}
