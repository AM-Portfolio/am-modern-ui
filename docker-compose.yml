version: '3.8'

services:
  # ============================================================================
  # MAIN APPLICATION SHELL - Port 9000
  # ============================================================================
  
  am-app:
    build:
      context: ../../..
      dockerfile: AM-Repos/ui/am_modern_ui/am_app/Dockerfile
    container_name: am-app-shell
    ports:
      - "9000:80"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=${API_BASE_URL:-https://am.asrax.in/api}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://am.asrax.in/api/auth}
    networks:
      - am-infra_am-net
    restart: unless-stopped
    labels:
      - "com.am.service=main-app"
      - "com.am.description=AM Investment Main Application Shell"

  # ============================================================================
  # STANDALONE UI APPLICATIONS (LIVE)
  # ============================================================================
  
  market-ui:
    build:
      context: ../../..
      dockerfile: AM-Repos/ui/am_modern_ui/am_market_ui/live/Dockerfile
    container_name: am-market-ui-live
    ports:
      - "9002:80"
    environment:
      - API_BASE_URL=${MARKET_API_URL:-https://am.asrax.in/api/market}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://am.asrax.in/api/auth}
    networks:
      - am-infra_am-net
    restart: unless-stopped
    labels:
      - "com.am.service=market-ui"
      - "com.am.description=Market Data Standalone Application"

  portfolio-ui:
    build:
      context: ../../..
      dockerfile: AM-Repos/ui/am_modern_ui/am_portfolio_ui/live/Dockerfile
      args:
        AM_AUTH_BASE_URL: ${AM_AUTH_BASE_URL:-https://am.asrax.in/auth}
        AM_PORTFOLIO_BASE_URL: ${AM_PORTFOLIO_BASE_URL:-https://am.asrax.in/portfolio}
        AM_TRADE_BASE_URL: ${AM_TRADE_BASE_URL:-https://am.asrax.in/trade}
        AM_MARKET_BASE_URL: ${AM_MARKET_BASE_URL:-https://am.asrax.in/market}
        AM_ANALYSIS_BASE_URL: ${AM_ANALYSIS_BASE_URL:-https://am.asrax.in/analysis}
        AM_DOC_PARSER_BASE_URL: ${AM_DOC_PARSER_BASE_URL:-https://am.asrax.in/doc-parser}
        AM_WS_URL: ${AM_WS_URL:-wss://am.asrax.in/market/ws/market-data-stream}
    container_name: am-portfolio-ui-live
    ports:
      - "9005:80"
    environment:
      - API_BASE_URL=${PORTFOLIO_API_URL:-https://am.asrax.in/api/portfolio}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://am.asrax.in/api/auth}
    networks:
      - am-infra_am-net
    restart: unless-stopped
    labels:
      - "com.am.service=portfolio-ui"
      - "com.am.description=Portfolio Management Standalone Application"

  trade-ui:
    build:
      context: ../../..
      dockerfile: AM-Repos/ui/am_modern_ui/am_trade_ui/live/Dockerfile
    container_name: am-trade-ui-live
    ports:
      - "9006:80"
    environment:
      - API_BASE_URL=${TRADE_API_URL:-https://am.asrax.in/api/trade}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://am.asrax.in/api/auth}
    networks:
      - am-infra_am-net
    restart: unless-stopped
    labels:
      - "com.am.service=trade-ui"
      - "com.am.description=Trade Management Standalone Application"

networks:
  am-infra_am-net:
    external: true

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
# 
# Build and run all services:
#   docker compose up -d --build
#
# Run specific service:
#   docker compose up -d am-app
#   docker compose up -d market-ui
#
# View logs:
#   docker compose logs -f am-app
#   docker compose logs -f market-ui
#
# Stop all services:
#   docker compose down
#
# Remove volumes and rebuild:
#   docker compose down -v
#   docker compose up -d --build
#
# Access URLs:
#   - Main App:     http://localhost:9000
#   - Market UI:    http://localhost:9002
#   - Portfolio UI: http://localhost:9005
#   - Trade UI:     http://localhost:9006
#
# ============================================================================
