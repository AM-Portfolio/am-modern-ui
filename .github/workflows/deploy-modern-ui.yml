name: Manual Deploy (Modern UI)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Select Image Tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - custom
      custom_tag:
        description: "If 'custom' selected, enter tag here"
        required: false
        type: string
      environment:
        description: "Target Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - preprod
          - prod

jobs:
  deploy:
    name: Deploy Modern UI to ${{ github.event.inputs.environment }}
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-deploy.yml@develop
    with:
      service_name: 'am-modern-ui'
      working_directory: 'am_app'
      language: 'flutter'
      environment: ${{ github.event.inputs.environment }}
      image_tag: ${{ github.event.inputs.image_tag == 'custom' && github.event.inputs.custom_tag || github.event.inputs.image_tag }}
      namespace: ${{ github.event.inputs.environment == 'prod' && 'am-apps-prod' || (github.event.inputs.environment == 'preprod' && 'am-apps-preprod' || 'am-apps-dev') }}
    secrets: inherit
