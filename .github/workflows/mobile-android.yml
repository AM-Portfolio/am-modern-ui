# Thin caller — triggers central Android pipeline in am-pipelines.
# Runs in parallel with modern-ui.yml (web). Does not block web deploy.
#
# Phase 2: calls @develop. Switch to @main after am-pipelines Phase 7.
# Trigger comment to verify pipeline artifact fix.

name: Modern UI Android

on:
  push:
    branches: ["main", "develop", "feature/**", "hotfix/**", "fix/**"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".env.example"
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  android:
    name: Publish Android
    permissions:
      contents: read
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-mobile-android.yml@develop
    with:
      working_directory: "am_app"
      build_mode: "debug"
      artifact_type: "apk"
      run_analyze: true
      run_tests: true
      upload_artifact: true
      # Dev engineer artifact lane on develop only
      deploy_dev: ${{ github.ref == 'refs/heads/develop' }}
      # Preprod stub (Phase 5 Play Internal) on develop or main
      deploy_preprod: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
      # Prod ONLY when merged to main (Phase 6 Play Production)
      deploy_prod: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
