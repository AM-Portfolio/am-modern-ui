name: Modern UI Publish

on:
  push:
    branches: ["main", "develop", "test/**"]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.env.example'
  pull_request:
    branches: ["main", "develop", "test/**"]
  workflow_dispatch:

jobs:
  publish:
    name: Publish UI
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'flutter'
      working_directory: 'am_app'
      image_name: 'am-modern-ui'
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit
