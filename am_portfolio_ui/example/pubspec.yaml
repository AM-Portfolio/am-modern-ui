name: portfolio_ui_example
description: Demonstrates how to use the am_portfolio_ui package.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  am_portfolio_ui:
    path: ../
  am_design_system:
    path: ../../am_design_system
  am_common:
    path: ../../am_common
  am_auth_ui:
    path: ../../am_auth_ui
  
  # State Management (Aligning with am_common)
  flutter_riverpod: ^3.0.3
  flutter_bloc: ^9.1.1
  
  # DI
  get_it: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
