name: am_portfolio_ui
description: "Portfolio Management Module (Holdings, Analytics, Heatmap)"
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  am_design_system:
    path: ../am_design_system
  am_common:
    path: ../am_common
  am_auth_ui:
    path: ../am_auth_ui
  am_user_ui:
    path: ../am_user_ui
  am_analysis_ui:
    path: ../am_analysis_ui

  # State Management
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  equatable: ^2.0.7

  # Network & Data
  dio: ^5.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Charts
  fl_chart: ^1.1.1
  intl: ^0.20.2

  # DI
  get_it: ^9.1.1
  injectable: ^2.4.4

  # Utils
  dartz: ^0.10.1
  go_router: ^13.0.0
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/application.properties
