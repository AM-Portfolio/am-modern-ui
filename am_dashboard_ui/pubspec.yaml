name: am_dashboard_ui
description: "Dashboard Module (Summary, Charts, Streaming)"
version: 0.0.1
publish_to: "none"
homepage: "https://example.com"

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  am_design_system:
    path: ../am_design_system
  am_library:
    path: ../am_library
  am_common:
    path: ../am_common

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  equatable: ^2.0.7

  # Network & Data
  dio: ^5.4.3
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # UI & Charts
  fl_chart: ^1.1.1
  intl: ^0.20.2
  flutter_animate: ^4.5.0

  # DI
  get_it: ^9.1.1
  injectable: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.3
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
