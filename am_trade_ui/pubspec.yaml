name: am_trade_ui
description: "Trade Management Module (Entry, Holdings, P&L, Analytics)"
version: 0.0.1
homepage:

environment:
  sdk: ^3.5.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  am_design_system:
    path: ../am_design_system
  am_common:
    path: ../am_common
  am_auth_ui:
    path: ../am_auth_ui
  am_portfolio_ui:
    path: ../am_portfolio_ui
  am_market_ui:
    path: ../am_market/ui
  am_market_common:
    path: ../am_market/common

  # State Management
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  equatable: ^2.0.7

  # Network & Data
  dio: ^5.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # UI & Charts
  fl_chart: ^1.1.1
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_quill: ^11.5.0

  # DI
  get_it: ^9.1.1
  injectable: ^2.4.4

  # Utils
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/application.properties
