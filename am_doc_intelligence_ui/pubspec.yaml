name: am_doc_intelligence_ui
description: "Document Intelligence UI Module for AM Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  http: ^1.6.0
  intl: ^0.20.2
  google_fonts: ^6.1.0
  flutter_bloc: ^9.1.1
  get_it: ^9.1.1
  
  # Design System
  am_common:
    path: ../am_common
  am_design_system:
    path: ../am_design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
